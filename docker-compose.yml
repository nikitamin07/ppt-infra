services:
  # 1. Веб-сервер / Reverse Proxy
  nginx:
    image: nginx:1.26-alpine3.20
    ports:
      - "80:80"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro #(read only)
    depends_on:
      - frontend
      - backend

  # 2. Фронтенд (Next.js)
  frontend:
    build:
      context: ../ppt-front
      dockerfile: Dockerfile.prod

  # 3. Бэкенд (PHP 8.2 + Apache)
  backend:
    build:
      context: ../ppt-back
      dockerfile: Dockerfile
    # Передаем переменные из .env внутрь контейнера
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_BASE=${DB_BASE}
      - DB_IS_HTTPS=${DB_IS_HTTPS}
      - TELEGRAM_CHATS=${TELEGRAM_CHATS}
      - TELEGRAM_API=${TELEGRAM_API}
      - RECAPTCHA_SECRET=${RECAPTCHA_SECRET}
      - RECAPTCHA_SITEKEY=${RECAPTCHA_SITEKEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  # 4. База данных PostgreSQL
  postgres:
    image: postgres:16.4-alpine3.20
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: